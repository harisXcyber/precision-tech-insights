<style>
@keyframes pti-pulse{0%,100%{box-shadow:0 0 0 0 rgba(102,126,234,.5),0 8px 32px rgba(102,126,234,.35);}70%{box-shadow:0 0 0 14px rgba(102,126,234,0),0 8px 32px rgba(102,126,234,.35);}}
@keyframes pti-in{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes pti-in-mob{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pti-msg{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pti-dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
#pti-fab{animation:pti-pulse 2.5s infinite;}
#pti-fab:hover{transform:scale(1.1)!important;cursor:pointer;}
.pti-msg-el{animation:pti-msg .25s ease forwards;}
.pti-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#818cf8;animation:pti-dot 1.2s infinite;}
.pti-dot:nth-child(2){animation-delay:.15s}.pti-dot:nth-child(3){animation-delay:.3s}
#pti-panel{display:none;position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;background:#0f172a;z-index:10000;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.5);animation:pti-in .3s cubic-bezier(.34,1.2,.64,1);}
#pti-panel.mob{width:100vw;top:0;left:0;right:0;bottom:0;animation:pti-in-mob .3s cubic-bezier(.34,1.2,.64,1);}
@media(max-width:640px){#pti-panel{width:100vw;left:0;animation:pti-in-mob .3s cubic-bezier(.34,1.2,.64,1);}}
</style>

<!-- FAB -->
<button id="pti-fab" style="position:fixed;bottom:28px;right:28px;z-index:9999;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;display:flex;align-items:center;justify-content:center;transition:transform .2s;cursor:pointer;">
  <svg id="pti-icon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
  <span id="pti-x" style="position:absolute;font-size:20px;opacity:0;transition:opacity .2s;">✕</span>
  <span style="position:absolute;top:3px;right:3px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #0f172a;"></span>
</button>

<!-- Panel -->
<div id="pti-panel" style="display:none;flex-direction:column;">
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#667eea,#764ba2);padding:16px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <div style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
    </div>
    <div style="flex:1;">
      <div style="color:#fff;font-weight:700;font-size:15px;">Precision Tech AI</div>
      <div style="color:rgba(255,255,255,.7);font-size:11px;display:flex;align-items:center;gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;"></span>Online · Replies instantly</div>
    </div>
    <button id="pti-close" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'">✕</button>
  </div>

  <!-- Messages -->
  <div id="pti-msgs" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#334155 transparent;">
    <div class="pti-msg-el" style="background:#1e293b;color:rgba(255,255,255,.85);padding:12px 14px;border-radius:4px 14px 14px 14px;font-size:13px;line-height:1.6;max-width:85%;">
      Hi! I'm the Precision Tech AI. Ask me about our services, products, or how we can help your business.
    </div>
  </div>

  <!-- Chips -->
  <div style="padding:8px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.06);">
    <button data-pti-quick="What services do you offer?" style="padding:5px 12px;border-radius:20px;border:1px solid rgba(102,126,234,.4);background:transparent;color:rgba(255,255,255,.7);font-size:11px;white-space:nowrap;cursor:pointer;">Services</button>
    <button data-pti-quick="Tell me about PrecisePortfolio" style="padding:5px 12px;border-radius:20px;border:1px solid rgba(102,126,234,.4);background:transparent;color:rgba(255,255,255,.7);font-size:11px;white-space:nowrap;cursor:pointer;">PrecisePortfolio</button>
    <button data-pti-quick="How do I get started?" style="padding:5px 12px;border-radius:20px;border:1px solid rgba(102,126,234,.4);background:transparent;color:rgba(255,255,255,.7);font-size:11px;white-space:nowrap;cursor:pointer;">Get Started</button>
  </div>

  <!-- Input -->
  <div style="padding:12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;">
    <div style="display:flex;gap:8px;background:#1e293b;border-radius:12px;padding:8px 12px;border:1px solid rgba(255,255,255,.08);">
      <input id="pti-input" type="text" placeholder="Ask me anything..." style="flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;">
      <button id="pti-send" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </div>
  </div>
</div>
