<style>
@keyframes pti-pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4),0 4px 20px rgba(59,130,246,.3);}70%{box-shadow:0 0 0 10px rgba(59,130,246,0),0 4px 20px rgba(59,130,246,.3);}}
@keyframes pti-slide{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes pti-msg{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pti-dot{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
#pti-fab{animation:pti-pulse 2.5s infinite;}
#pti-fab:hover{transform:scale(1.08)!important;}
#pti-panel{display:none;position:fixed;bottom:90px;right:24px;width:360px;max-width:calc(100vw - 32px);background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.06);flex-direction:column;overflow:hidden;z-index:9998;}
@media(max-width:480px){#pti-panel{bottom:0;right:0;left:0;width:100%;max-width:100%;border-radius:20px 20px 0 0;max-height:85vh;}}
.pti-msg-el{animation:pti-msg .2s ease forwards;}
.pti-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#94a3b8;animation:pti-dot 1.2s infinite;}
.pti-dot:nth-child(2){animation-delay:.15s;}.pti-dot:nth-child(3){animation-delay:.3s;}
</style>

<button id="pti-fab" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s;">
  <svg id="pti-icon" width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transition:opacity .2s;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
  <svg id="pti-x" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="position:absolute;opacity:0;transition:opacity .2s;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
  <span style="position:absolute;top:2px;right:2px;width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid #fff;"></span>
</button>

<div id="pti-panel">
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#3b82f6,#6366f1);padding:16px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <div style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
    </div>
    <div style="flex:1;">
      <div style="color:#fff;font-weight:700;font-size:14px;letter-spacing:.01em;">Precision Tech AI</div>
      <div style="color:rgba(255,255,255,.8);font-size:11px;display:flex;align-items:center;gap:4px;margin-top:1px;">
        <span style="width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block;"></span>Online · Replies instantly
      </div>
    </div>
    <button id="pti-close" style="background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,.25)'" onmouseout="this.style.background='rgba(255,255,255,.15)'">✕</button>
  </div>

  <!-- Messages -->
  <div id="pti-msgs" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#f8fafc;min-height:200px;max-height:340px;scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent;">
    <div class="pti-msg-el" style="background:#fff;color:#374151;padding:12px 14px;border-radius:4px 14px 14px 14px;font-size:13px;line-height:1.6;max-width:85%;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e5e7eb;">
      Hi! I'm the Precision Tech AI. Ask me about our services, products, or how we can help your business.
    </div>
  </div>

  <!-- Quick chips -->
  <div style="padding:8px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:#f8fafc;border-top:1px solid #e5e7eb;scrollbar-width:none;">
    <button data-pti-quick="What services do you offer?" style="padding:5px 12px;border-radius:20px;border:1px solid #dbeafe;background:#eff6ff;color:#3b82f6;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#eff6ff'">Services</button>
    <button data-pti-quick="Tell me about PrecisePortfolio" style="padding:5px 12px;border-radius:20px;border:1px solid #dbeafe;background:#eff6ff;color:#3b82f6;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#eff6ff'">PrecisePortfolio</button>
    <button data-pti-quick="How do I get started?" style="padding:5px 12px;border-radius:20px;border:1px solid #dbeafe;background:#eff6ff;color:#3b82f6;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#eff6ff'">Get Started</button>
  </div>

  <!-- Input -->
  <div style="padding:12px;background:#fff;border-top:1px solid #e5e7eb;flex-shrink:0;">
    <div style="display:flex;gap:8px;background:#f1f5f9;border-radius:12px;padding:8px 12px;border:1.5px solid #e2e8f0;transition:border-color .2s;" id="pti-wrap" onfocusin="this.style.borderColor='#3b82f6'" onfocusout="this.style.borderColor='#e2e8f0'">
      <input id="pti-input" type="text" placeholder="Ask me anything..." style="flex:1;background:transparent;border:none;outline:none;color:#1e293b;font-size:13px;font-family:inherit;">
      <button id="pti-send" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </div>
    <div style="text-align:center;margin-top:6px;font-size:10px;color:#94a3b8;">Powered by <a href="https://precisiontechinsights.com" style="color:#3b82f6;text-decoration:none;">Precision Tech Insights</a></div>
  </div>
</div>
